name: example
description: Demonstrates how to use the fl_pip plugin.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.10.0 <4.0.0'
  flutter: '>=3.38.7'

dependencies:
  flutter:
    sdk: flutter
  fl_pip:
    path: ../
  flutter_waya: ^11.6.0

dev_dependencies:
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
