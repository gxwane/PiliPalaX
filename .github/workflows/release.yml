name: PiliPalaX Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  prepare:
    name: Validate release metadata
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      version: ${{ steps.version.outputs.version }}
      prerelease: ${{ steps.version.outputs.prerelease }}
    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.38.7
          channel: stable
          cache: true
      - name: Validate tag and pubspec version
        id: version
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          pub_version=$(sed -n 's/^version:[[:space:]]*//p' pubspec.yaml | head -n 1 | tr -d '\r')
          version="${pub_version%%+*}"

          if [[ ! "${version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?$ ]]; then
            echo "pubspec.yaml contains an invalid semantic version: ${pub_version}" >&2
            exit 1
          fi
          if [[ "${tag}" != "v${version}" ]]; then
            echo "Tag ${tag} does not match pubspec version ${pub_version}; expected v${version}" >&2
            exit 1
          fi

          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          if [[ "${version}" == *-* ]]; then
            echo "prerelease=true" >> "${GITHUB_OUTPUT}"
          else
            echo "prerelease=false" >> "${GITHUB_OUTPUT}"
          fi
      - name: Resolve locked dependencies
        run: flutter pub get --enforce-lockfile
      - name: Extract release notes from changelog
        run: dart run tool/extract_changelog.dart "${{ github.ref_name }}" build/release-notes.md
      - name: Upload release notes
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: build/release-notes.md
          if-no-files-found: error
          retention-days: 7

  build:
    name: Build ${{ matrix.target }}
    needs: prepare
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: android-split-per-abi
            platform: android
            os: ubuntu-latest
          - target: android-universal
            platform: android
            os: ubuntu-latest
          - target: ios-unsigned
            platform: ios
            os: macos-latest
    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
      - name: Set up Java
        if: matrix.platform == 'android'
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.38.7
          channel: stable
          cache: true
      - name: Resolve locked dependencies
        run: flutter pub get --enforce-lockfile
      - name: Configure Android signing
        if: matrix.platform == 'android'
        shell: bash
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [[ -z "${KEYSTORE_BASE64}" ]]; then
            echo "KEYSTORE_BASE64 is not configured" >&2
            exit 1
          fi
          printf '%s' "${KEYSTORE_BASE64}" | base64 --decode > android/app/vvex.jks
      - name: Build split Android APKs
        if: matrix.target == 'android-split-per-abi'
        run: flutter build apk --release --split-per-abi --no-pub
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      - name: Build universal Android APK
        if: matrix.target == 'android-universal'
        run: flutter build apk --release --no-pub
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      - name: Build unsigned iOS app
        if: matrix.platform == 'ios'
        run: flutter build ios --release --no-codesign --no-pub
      - name: Package split Android APKs
        if: matrix.target == 'android-split-per-abi'
        shell: bash
        run: |
          version='${{ needs.prepare.outputs.version }}'
          mkdir -p build/release
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk "build/release/PiliPalaX-android-arm64-v8a-v${version}.apk"
          cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk "build/release/PiliPalaX-android-armeabi-v7a-v${version}.apk"
          cp build/app/outputs/flutter-apk/app-x86_64-release.apk "build/release/PiliPalaX-android-x86_64-v${version}.apk"
      - name: Package universal Android APK
        if: matrix.target == 'android-universal'
        shell: bash
        run: |
          version='${{ needs.prepare.outputs.version }}'
          mkdir -p build/release
          cp build/app/outputs/flutter-apk/app-release.apk "build/release/PiliPalaX-android-universal-v${version}.apk"
      - name: Package unsigned iOS IPA
        if: matrix.platform == 'ios'
        shell: bash
        run: |
          version='${{ needs.prepare.outputs.version }}'
          mkdir -p build/release Payload
          cp -R build/ios/iphoneos/Runner.app Payload/
          zip -qry "build/release/PiliPalaX-ios-unsigned-v${version}.ipa" Payload
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: PiliPalaX-${{ matrix.target }}
          path: build/release/*
          if-no-files-found: error
          retention-days: 14

  publish:
    name: Publish GitHub Release
    needs: [prepare, build]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: PiliPalaX-*
          path: dist
          merge-multiple: true
      - name: Download release notes
        uses: actions/download-artifact@v4
        with:
          name: release-notes
          path: release-notes
      - name: Publish release
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ github.ref_name }}
          name: PiliPalaX v${{ needs.prepare.outputs.version }}
          artifacts: dist/*
          artifactErrorsFailBuild: true
          bodyFile: release-notes/release-notes.md
          prerelease: ${{ needs.prepare.outputs.prerelease }}
          generateReleaseNotes: false
          allowUpdates: true
