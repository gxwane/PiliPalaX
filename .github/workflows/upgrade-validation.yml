name: Upgrade validation

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.38.7
          channel: stable
          cache: true
      - run: flutter pub get --enforce-lockfile
      - run: flutter analyze --no-pub --fatal-warnings --no-fatal-infos
      - run: flutter test --no-pub

  android:
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.38.7
          channel: stable
          cache: true
      - run: flutter pub get --enforce-lockfile
      - run: flutter build apk --debug --no-pub

  ios:
    needs: quality
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.38.7
          channel: stable
          cache: true
      - run: flutter pub get --enforce-lockfile
      - run: flutter build ios --release --no-codesign --no-pub
