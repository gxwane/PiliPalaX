name: Validation

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: Analyze and test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.38.7
          channel: stable
          cache: true
      - name: Resolve locked dependencies
        run: flutter pub get --enforce-lockfile
      - name: Analyze
        run: flutter analyze --no-pub --fatal-warnings --no-fatal-infos
      - name: Test
        run: flutter test --no-pub

  android:
    name: Build Android release APK
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.38.7
          channel: stable
          cache: true
      - name: Resolve locked dependencies
        run: flutter pub get --enforce-lockfile
      - name: Create validation signing key
        shell: bash
        run: |
          keytool -genkeypair -noprompt \
            -keystore "${RUNNER_TEMP}/validation.jks" \
            -storepass validation \
            -alias validation \
            -keypass validation \
            -dname "CN=PiliPalaY CI" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 1
      - name: Build
        run: flutter build apk --release
        env:
          KEYSTORE: ${{ runner.temp }}/validation.jks
          KEYSTORE_PASSWORD: validation
          KEY_ALIAS: validation
          KEY_PASSWORD: validation

  ios:
    name: Build unsigned iOS app
    needs: quality
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.38.7
          channel: stable
          cache: true
      - name: Resolve locked dependencies
        run: flutter pub get --enforce-lockfile
      - name: Build
        run: flutter build ios --release --no-codesign --no-pub
