name: PiliPalaX
description: 使用 Flutter 开发的哔哩哔哩非官方第三方客户端。
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: "none" # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.2.0+114520

environment:
  sdk: ">=3.10.0 <4.0.0"

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.9
  # 动态取色
  dynamic_color: ^1.8.1

  get: ^4.7.3

  # 网络
  dio: ^5.10.0
  cookie_jar: ^4.0.9
  dio_cookie_manager: ^3.4.0
  connectivity_plus: ^6.1.5

  # 图片
  cached_network_image: ^3.4.1
  extended_image: ^10.1.0
  saver_gallery: ^4.1.2

  # QRCode
  qr_flutter: ^4.1.0

  # 存储
  path_provider: ^2.1.6
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # 设备信息
  device_info_plus: ^11.5.0
  # 权限
  permission_handler: ^12.0.3
  # 分享
  share_plus: ^11.1.0
  # cookie 管理
  # 浏览器
  webview_flutter: ^4.14.1
  # 下拉刷新
  pull_to_refresh_notification: ^3.1.1
  custom_refresh_indicator: ^4.0.1
  # 图标
  font_awesome_flutter: ^11.0.0
  material_design_icons_flutter: ^7.0.7296
  # toast
  flutter_smart_dialog: ^5.1.0
  # 下滑关闭
  dismissible_page: ^1.0.2
  # 加密
  crypto: ^3.0.7
  encrypt: ^5.0.3

  # 视频播放器
  media_kit: 1.2.6
#    git:
#      url: https://github.com/media-kit/media-kit.git
#      ref: main
#      path: media_kit
  media_kit_video: 2.0.1
#    git:
#      url: https://github.com/media-kit/media-kit.git
#      ref: main
#      path: media_kit_video
  media_kit_libs_video: 1.0.7
#    git:
#      url: https://github.com/media-kit/media-kit.git
#      ref: main
#      path: libs/universal/media_kit_libs_video
  # 媒体通知
  audio_service: ^0.18.19
  audio_session: ^0.2.4

  # 音量、亮度、屏幕控制
  flutter_volume_controller: ^2.0.1
  screen_brightness: ^2.1.11
  wakelock_plus: 1.3.3
  universal_platform: ^1.1.0
  auto_orientation_v2: ^2.3.8
  fixnum: ^1.1.1
  protobuf: ^6.0.0

  # 获取appx信息
  package_info_plus: ^8.3.1
  url_launcher: ^6.3.2
  flutter_svg: ^2.3.0
  # 防抖节流
  easy_debounce: ^2.0.3
  # 高帧率
  flutter_displaymode: ^0.7.0
  # scheme跳转
  app_links: ^7.0.0
  # 弹幕
  canvas_danmaku:
    git:
      url: https://github.com/orz12/canvas_danmaku.git
      ref: f1f99f9755b2a6a238a650d1c023f4ffb53533e9
  # 状态栏图标控制
  # 应用内悬浮窗
  flutter_floating:
    git:
      url: https://github.com/orz12/flutter_floating.git
      ref: 889d637b071159a24b0d442ae605635a7212a1e5
  # pip
  fl_pip:
    path: packages/fl_pip
  # html解析
  html: ^0.15.6
  # html渲染
  flutter_html: ^3.0.0
  # 极验
  gt3_flutter_plugin: ^0.1.1
  uuid: ^4.6.0
  pub_semver: ^2.2.0
  scrollable_positioned_list: ^0.3.8
  nil: ^1.1.1
  catcher_2: ^2.1.9
  logger: ^2.7.0
  path: ^1.9.1
  #瀑布流
  waterfall_flow: ^3.1.1
  #跑马灯
  marquee: ^2.3.0
  # 调色板
  flex_seed_scheme: ^4.0.1
#  android_window: ^0.4.0
dev_dependencies:
  flutter_test:
    sdk: flutter

#  pigeon: ^22.6.1

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  # flutter_launcher_icons:
  #   git:
  #     url: https://github.com/nvi9/flutter_launcher_icons.git
  #     ref: e045d40
  hive_generator: ^2.0.1
  build_runner: 2.4.13
  flutter_native_splash: ^2.4.7

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: assets/images/logo/logo_android_2.png
  image_path_android: assets/images/logo/logo_android_2.png
  image_path_ios: assets/images/logo/logo_ios.png
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: assets/images/logo/logo_android_2.png
  adaptive_icon_monochrome: assets/images/logo/logo_android_2.png
  macos:
    generate: true
    image_path: assets/images/logo/logo_ios.png

flutter_native_splash:
  android_12:
    color: "#ffffff"
    color_dark: "#212121"
  color: "#ffffff"
  color_dark: "#212121"
  image: assets/images/logo/logo_android_2.png
  image_dark: assets/images/logo/logo_android_2.png

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:
  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/images/
    - assets/images/lv/
    - assets/images/logo/
    - assets/images/live/
  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/assets-and-images/#resolution-aware

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/assets-and-images/#from-packages

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  fonts:
    - family: fansCard
      fonts:
        - asset: assets/fonts/fansCard.ttf
    - family: Jura-Bold
      fonts:
        - asset: assets/fonts/Jura-Bold.ttf
    # - family: HarmonyOS
    #   fonts:
    #     - asset: assets/fonts/HarmonyOS_Sans_SC_Regular.ttf

  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/custom-fonts/#from-packages
