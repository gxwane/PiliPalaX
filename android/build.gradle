def useChinaMirrors = providers.gradleProperty("useChinaMirrors")
    .map { it.toBoolean() }
    .getOrElse(false) && System.getenv("CI") != "true"

allprojects {
    repositories {
        if (useChinaMirrors) {
            maven { url = uri("https://maven.aliyun.com/repository/google") }
            maven { url = uri("https://maven.aliyun.com/repository/central") }
            maven { url = uri("https://maven.aliyun.com/repository/public") }
        }
        maven { url = uri("https://storage.googleapis.com/download.flutter.io") }
        google()
        mavenCentral()
    }
}

rootProject.buildDir = new File(rootProject.projectDir, '../build')
subprojects {
    project.buildDir = new File(rootProject.buildDir, project.name)
    project.evaluationDependsOn(':app')
}

tasks.register("clean", Delete) {
    delete rootProject.buildDir
}
